# ──────────────────────────────────────────────
# 4. Concepto narrativo
# ──────────────────────────────────────────────
concept:
  overview: |
    Esta versión reduce el viaje a tres bases: Zhangjiajie, Chongqing y Shenzhen. El objetivo no es sumar ciudades, sino permitir que cada destino tenga días completos, noches aprovechables y margen para descansar o cambiar el plan.

    Zhangjiajie ocupa cuatro noches porque el clima puede modificar por completo la experiencia. Chongqing recibe tres noches para recorrerla sin convertirla en una sucesión de fotos. Shenzhen ocupa cuatro noches porque Huaqiangbei no es la única razón para visitarla: también interesa su arquitectura, sus barrios modernos y su vida cotidiana.

    La ciudad internacional de entrada se elige por precio y conexión. Puede ser Beijing, Shanghai, Guangzhou o Hong Kong, pero no se considera una parada turística obligatoria.

  reasons:
    - title: "Solo tres bases"
      description: "Reduce los cambios de hotel y permite conocer mejor cada zona."
    - title: "Margen meteorológico"
      description: "Zhangjiajie dispone de días suficientes para reorganizar miradores y senderos si aparece niebla o lluvia."
    - title: "Noches completas"
      description: "Chongqing y Shenzhen pueden disfrutarse después del atardecer sin llegar y salir al día siguiente."
    - title: "Experiencias que no se repiten"
      description: "Naturaleza fantástica, megaciudad vertical y capital tecnológica."
    - title: "Mejor relación entre viaje y descanso"
      description: "Hay tardes libres y ninguna parada se reduce a una escala fotográfica."

  idealFor:
    - "Una persona que prefiera pocas bases y días completos."
    - "Viajeros interesados en paisajes, fotografía, ciudades futuristas y tecnología."
    - "Quienes disfruten caminar pero no quieran cambiar de hotel constantemente."
    - "Personas dispuestas a adaptar actividades según el clima."

  notIdealFor:
    - "Quienes quieran incluir Beijing, Shanghai, Xi'an y la Gran Muralla en el mismo viaje."
    - "Personas que busquen un itinerario exclusivamente histórico."
    - "Quienes no quieran realizar senderos, escaleras o teleféricos."

